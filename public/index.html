    <script>

      //!important![區段起始] 載入PDF (預)
      const pdfUrl = "https://raw.githubusercontent.com/a0kuma/tssca2025activity1/refs/heads/main/dm2.pdf";
      var container = null;// document.querySelector(".mainBC");

      // Create & insert the canvas (match container size)
      const canvas = document.createElement("canvas");
      canvas.id = "mainC";
      canvas.style.display = "block";
      canvas.style.width = "100%";   // CSS sizing
      canvas.style.height = "100%";  // CSS sizing
      //!important! wait for DOM loadded ... container.appendChild(canvas);
      var ctx = null;//canvas.getContext("2d");

      // 一定要在 getDocument 之前設定，而且是指向「檔案 URL」，不是再用 <script> 來載入
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.6.347/pdf.worker.min.js";

      let pdfDoc = null;
      let page = null;

      // Render the PDF page to fit inside the canvas (preserving aspect ratio)
      async function renderToFit() {
          if (!page) return;
          // Match the canvas's internal pixel size to the container's current CSS size
          // Use getBoundingClientRect to get pixel sizes (includes fractional pixels)
          const { width: cssW, height: cssH } = container.getBoundingClientRect();
          if (cssW <= 0 || cssH <= 0) return;
          // Set backing store pixels (considering device pixel ratio for sharpness)
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.max(1, Math.round(cssW * dpr));
          canvas.height = Math.max(1, Math.round(cssH * dpr));
          // Clear with a background (white letterbox)
          ctx.save();
          ctx.setTransform(1, 0, 0, 1, 0, 0); // reset any transforms
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
          // Get the page's natural size at scale=1
          const viewport = page.getViewport({ scale: 1 });
          const naturalW = viewport.width;
          const naturalH = viewport.height;
          // Compute scale to FIT inside our canvas
          const scale = Math.min(canvas.width / naturalW, canvas.height / naturalH);
          // Render to an offscreen canvas at the scaled PDF size
          const renderW = Math.floor(naturalW * scale);
          const renderH = Math.floor(naturalH * scale);
          const offscreen = document.createElement("canvas");
          offscreen.width = renderW;
          offscreen.height = renderH;
          const renderCtx = offscreen.getContext("2d");
          const renderViewport = page.getViewport({ scale });
          await page.render({
              canvasContext: renderCtx,
              viewport: renderViewport
          }).promise;
          // Center the rendered page on the main canvas (letterbox)
          const offsetX = Math.floor((canvas.width - renderW) / 2);
          const offsetY = Math.floor((canvas.height - renderH) / 2);
          // Draw the scaled page into our main canvas, accounting for DPR
          ctx.drawImage(offscreen, offsetX, offsetY);
      }
      async function init() {
          try {
              // Load the PDF
              pdfDoc = await pdfjsLib.getDocument({ url: pdfUrl }).promise;
              // Get page 1 (change this if you want another page)
              page = await pdfDoc.getPage(1);
              // Initial render
              await renderToFit();
              // Re-render on container resize
              const ro = new ResizeObserver(() => renderToFit());
              ro.observe(container);
              // Also re-render on DPR changes (some browsers fire this on zoom/monitor switch)
              window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`).addEventListener?.("change", renderToFit);
              window.addEventListener("orientationchange", renderToFit);
          } catch (err) {
              console.error("Failed to load or render PDF:", err);
          }
      }
      document.addEventListener('DOMContentLoaded', async () => {
          container = document.querySelector(".mainBC");
          container.appendChild(canvas);
          ctx = canvas.getContext("2d");
          await init();
